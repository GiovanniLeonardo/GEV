<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Capacity Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #0f172a; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #f8fafc;
        }
        .glass-card { 
            background: #1e293b; 
            border: 1px solid #334155; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        input, select { 
            background-color: #0f172a !important; 
            color: white !important;
            border: 1px solid #475569 !important;
        }
        input:focus, select:focus {
            border-color: #38bdf8 !important;
            outline: none;
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }
        .result-gradient {
            background: linear-gradient(90deg, #38bdf8 0%, #34d399 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="py-12 px-4">
    <div class="max-w-5xl mx-auto">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-black tracking-tight text-white mb-3">
                Network Capacity Planner
            </h1>
            <p class="text-slate-400 text-lg">Infrastructure sizing with Auto-Unit scaling (Mbps/Gbps).</p>
        </div>

        

            <!-- User Count Card -->
            <div class="glass-card rounded-3xl p-8">
                <div class="flex items-center space-x-3 mb-6">
                    <div class="bg-emerald-500/20 p-2 rounded-lg">
                        <svg class="w-6 h-6 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    </div>
                    <h2 class="text-xl font-bold">Concurrent Users</h2>
                </div>

                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">User / PC Count</label>
                        <input type="number" id="uCount" value="50" class="w-full p-3 rounded-xl text-lg" oninput="calc()">
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">Usage Intensity</label>
                        <select id="profile" class="w-full p-3 rounded-xl font-bold" onchange="calc()">
                            <option value="2">Light: Office/Web (2 Mbps)</option>
                            <option value="10" selected>Standard: Video/Cloud (10 Mbps)</option>
                            <option value="25">Heavy: 4K/Backups (25 Mbps)</option>
                            <option value="100">Extreme: Pro Media (100 Mbps)</option>
                        </select>
                    </div>

                    <div class="pt-4 border-t border-slate-700 flex justify-between items-end">
                        <span class="text-slate-400">Base Demand</span>
                        <span class="text-2xl font-mono font-bold text-emerald-400"><span id="outUsers">0</span> Mbps</span>
                    </div>
                </div>
            </div>
        </div>
        
        
        <div class="grid lg:grid-cols-2 gap-8 mb-8">
            <!-- Data Transfer Card -->
            <div class="glass-card rounded-3xl p-8">
                <div class="flex items-center space-x-3 mb-6">
                    <div class="bg-blue-500/20 p-2 rounded-lg">
                        <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"></path></svg>
                    </div>
                    <h2 class="text-xl font-bold">Data Transfer</h2>
                </div>

                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">Total File Size</label>
                        <div class="flex gap-2">
                            <input type="number" id="fileSize" value="500" class="flex-1 p-3 rounded-xl text-lg" oninput="calc()">
                            <select id="fileUnit" class="p-3 rounded-xl font-bold" onchange="calc()">
                                <option value="GB">GB</option>
                                <option value="TB">TB</option>
                                <option value="MB">MB</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">Desired Time</label>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="relative">
                                <input type="number" id="h" placeholder="0" class="w-full p-3 rounded-xl text-lg" oninput="calc()">
                                <span class="absolute right-3 top-3.5 text-slate-500 text-sm">Hrs</span>
                            </div>
                            <div class="relative">
                                <input type="number" id="m" placeholder="10" class="w-full p-3 rounded-xl text-lg" oninput="calc()">
                                <span class="absolute right-3 top-3.5 text-slate-500 text-sm">Min</span>
                            </div>
                        </div>
                    </div>

                    <div class="pt-4 border-t border-slate-700 flex justify-between items-end">
                        <span class="text-slate-400">Req. Speed</span>
                        <span class="text-2xl font-mono font-bold text-blue-400"><span id="outTransfer">0</span> Mbps</span>
                    </div>
                </div>
            </div>

        <!-- Result Card with Auto-Scaling Unit -->
        <div class="glass-card rounded-[2.5rem] p-10 text-center relative border-2 border-slate-700">
            <h3 class="text-slate-500 uppercase font-black tracking-widest text-sm mb-4">Total Recommended Plan</h3>
            <div class="flex items-center justify-center">
                <span id="outTotal" class="text-8xl font-black result-gradient">0</span>
                <span id="unitLabel" class="text-3xl font-bold ml-6 text-slate-600 tracking-tighter">Mbps</span>
            </div>
            <p class="text-slate-500 mt-6 text-sm italic">Includes +20% overhead buffer for stability.</p>
        </div>
    </div>

    <script>
        function calc() {
            const size = parseFloat(document.getElementById('fileSize').value) || 0;
            const unit = document.getElementById('fileUnit').value;
            const h = parseFloat(document.getElementById('h').value) || 0;
            const m = parseFloat(document.getElementById('m').value) || 0;
            const users = parseFloat(document.getElementById('uCount').value) || 0;
            const profile = parseFloat(document.getElementById('profile').value) || 0;

            let bits = 0;
            if(unit === 'MB') bits = size * 8;
            if(unit === 'GB') bits = size * 8 * 1024;
            if(unit === 'TB') bits = size * 8 * 1024 * 1024;

            const sec = (h * 3600) + (m * 60);
            let tMbps = (sec > 0) ? (bits / sec) : 0;
            document.getElementById('outTransfer').innerText = tMbps.toLocaleString(undefined, {maximumFractionDigits:1});

            let uMbps = users * profile;
            document.getElementById('outUsers').innerText = uMbps.toLocaleString();

            // Total with buffer
            let finalMbps = (tMbps + uMbps) * 1.2;

            // SMART UNIT LOGIC
            if (finalMbps >= 1000) {
                document.getElementById('outTotal').innerText = (finalMbps / 1000).toFixed(1);
                document.getElementById('unitLabel').innerText = "Gbps";
            } else {
                document.getElementById('outTotal').innerText = Math.ceil(finalMbps).toLocaleString();
                document.getElementById('unitLabel').innerText = "Mbps";
            }
        }
        calc();
    </script>
</body>
</html>
